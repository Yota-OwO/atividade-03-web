<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="estilo.css" />
    <title>Calculadora de Média</title>
  </head>
  <body>
    <h1>
        <p>Calculadora de Média</p>
      <div class="calculadora">
        <input
          type="number"
          step="0.1"
          id="nota1"
          placeholder="Nota 1 (Ex: 8.5)"
        />
        <input
          type="number"
          step="0.1"
          id="nota2"
          placeholder="Nota 2 (Ex: 6.0)"
        />
        <button id="btn-calcular">Calcular Média</button>
        <p id="resultado-media"></p>
      </div>
    </h1>
    <script src="app.js"></script>
  </body>
</html>
