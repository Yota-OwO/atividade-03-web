<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="estilo.css" />
    <title>Perfil do Usuário</title>
  </head>
  <body>
    <div class="perfil-usuario">
      <h3 id="saudacao">Bem-vindo, Visitante.</h3>

      <input
        type="text"
        id="input-cargo"
        placeholder="Seu Cargo (Ex: Analista)"
      />
      <button id="btn-salvar">Salvar Perfil Localmente</button>
    </div>
    <script src="app.js"></script>
  </body>
</html>
